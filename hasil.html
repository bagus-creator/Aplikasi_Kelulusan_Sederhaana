<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hasil Kelulusan</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-blue-700 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between py-3 sm:h-16">

        <div class="flex items-center gap-3">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRyOE9-T4GMjYjEqpmCgiWbmV4mC3cpuqDeuA&s"
            alt="Logo Sekolah"
            class="w-10 h-10 rounded-full bg-white p-1 object-cover"
          >

          <div class="text-white">
            <h1 class="font-bold text-sm sm:text-base">
              SMK Contoh Indonesia
            </h1>

            <p class="text-xs text-blue-100">
              Tahun Ajaran 2025/2026
            </p>
          </div>
        </div>

        <span class="text-white text-xs sm:text-sm mt-2 sm:mt-0">
          Hasil Kelulusan
        </span>

      </div>
    </div>
  </nav>

  <!-- Content -->
  <main
    class="flex-1 flex items-center justify-center px-4 py-6"
  >
    <div class="w-full max-w-4xl">

      <div
        id="hasil"
        class="bg-white rounded-2xl shadow-xl p-5 sm:p-8"
      >
        <div class="text-center">
          <h2 class="text-2xl font-bold text-slate-700">
            Memeriksa Data...
          </h2>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="py-4 text-center">
    <p class="text-xs text-slate-500">
      © 2026 SMK Contoh Indonesia. All Rights Reserved.
    </p>
  </footer>

  <script>
    async function cekKelulusan() {

      const hasil = document.getElementById("hasil");

      try {

        const namaInput =
          localStorage.getItem("nama");

        const nisnInput =
          localStorage.getItem("nisn");

        const response =
          await fetch("data/siswa.json");

        if (!response.ok) {
          throw new Error("Gagal memuat data");
        }

        const data =
          await response.json();

        // Cari berdasarkan NISN
        const siswa = data.find(
          item =>
            item.nisn.toString().trim() ===
            nisnInput?.toString().trim()
        );

        // NISN tidak ditemukan
        if (!siswa) {

          hasil.innerHTML = `
            <div class="text-center">

              <div class="text-7xl mb-4">
                ❌
              </div>

              <h1 class="text-3xl font-bold text-red-600 mb-3">
                Data Tidak Ditemukan
              </h1>

              <p class="text-slate-600 mb-8">
                NISN tidak terdaftar pada sistem.
              </p>

              <a
                href="index.html"
                class="inline-block w-full sm:w-auto bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800"
              >
                Kembali
              </a>

            </div>
          `;

          return;
        }

        // Nama tidak cocok
        if (
          siswa.nama.toLowerCase().trim() !==
          namaInput?.toLowerCase().trim()
        ) {

          hasil.innerHTML = `
            <div class="text-center">

              <div class="text-7xl mb-4">
                ⚠️
              </div>

              <h1 class="text-3xl font-bold text-amber-600 mb-3">
                Verifikasi Gagal
              </h1>

              <p class="text-slate-600 mb-8">
                Nama tidak sesuai dengan NISN yang dimasukkan.
              </p>

              <a
                href="index.html"
                class="inline-block w-full sm:w-auto bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800"
              >
                Kembali
              </a>

            </div>
          `;

          return;
        }

        const warnaStatus =
          siswa.status === "LULUS"
            ? "text-green-600"
            : "text-red-600";

        const iconStatus =
          siswa.status === "LULUS"
            ? "🎓"
            : "🙏";

        const judulStatus =
          siswa.status === "LULUS"
            ? "SELAMAT!"
            : "MOHON MAAF";

        const pesanStatus =
          siswa.status === "LULUS"
            ? "Anda dinyatakan LULUS."
            : "Anda dinyatakan TIDAK LULUS.";

        hasil.innerHTML = `

          <div class="text-center mb-8">

            <div class="text-7xl mb-4">
              ${iconStatus}
            </div>

            <h1 class="text-3xl sm:text-4xl font-bold ${warnaStatus} mb-2">
              ${judulStatus}
            </h1>

            <p class="text-slate-600">
              ${pesanStatus}
            </p>

          </div>

          <div class="border rounded-xl overflow-hidden overflow-x-auto">

            <table class="w-full min-w-[600px]">

              <tr class="border-b">
                <td class="bg-slate-50 p-4 font-semibold">
                  Nomor Urut
                </td>
                <td class="p-4">
                  ${siswa.no}
                </td>
              </tr>

              <tr class="border-b">
                <td class="bg-slate-50 p-4 font-semibold">
                  Nama Lengkap
                </td>
                <td class="p-4">
                  ${siswa.nama}
                </td>
              </tr>

              <tr class="border-b">
                <td class="bg-slate-50 p-4 font-semibold">
                  NIPD
                </td>
                <td class="p-4">
                  ${siswa.nipd}
                </td>
              </tr>

              <tr class="border-b">
                <td class="bg-slate-50 p-4 font-semibold">
                  NISN
                </td>
                <td class="p-4">
                  ${siswa.nisn}
                </td>
              </tr>

              <tr class="border-b">
                <td class="bg-slate-50 p-4 font-semibold">
                  Jenis Kelamin
                </td>
                <td class="p-4">
                  ${siswa.jk === "L" ? "Laki-Laki" : "Perempuan"}
                </td>
              </tr>

              <tr class="border-b">
                <td class="bg-slate-50 p-4 font-semibold">
                  Tempat Lahir
                </td>
                <td class="p-4">
                  ${siswa.tempat_lahir}
                </td>
              </tr>

              <tr class="border-b">
                <td class="bg-slate-50 p-4 font-semibold">
                  Tanggal Lahir
                </td>
                <td class="p-4">
                  ${siswa.tanggal_lahir}
                </td>
              </tr>

              <tr class="border-b">
                <td class="bg-slate-50 p-4 font-semibold">
                  NPSN
                </td>
                <td class="p-4">
                  ${siswa.npsn}
                </td>
              </tr>

              <tr>
                <td class="bg-slate-50 p-4 font-semibold">
                  Status Kelulusan
                </td>
                <td class="p-4 font-bold ${warnaStatus}">
                  ${siswa.status}
                </td>
              </tr>

            </table>

          </div>

          <div class="mt-8 text-center">

            <a
              href="index.html"
              class="inline-block w-full sm:w-auto bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800 transition"
            >
              Kembali
            </a>

          </div>

        `;

      } catch (error) {

        console.error(error);

        hasil.innerHTML = `
          <div class="text-center">

            <div class="text-7xl mb-4">
              ⚠️
            </div>

            <h1 class="text-3xl font-bold text-red-600 mb-3">
              Terjadi Kesalahan
            </h1>

            <p class="text-slate-600 mb-8">
              Gagal memuat data siswa.
            </p>

            <a
              href="index.html"
              class="inline-block w-full sm:w-auto bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800"
            >
              Kembali
            </a>

          </div>
        `;
      }
    }

    cekKelulusan();
  </script>

</body>
</html>

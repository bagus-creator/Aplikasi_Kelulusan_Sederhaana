
<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hasil Kelulusan</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-blue-700 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between py-3 sm:h-16">

        <div class="flex items-center gap-3">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRyOE9-T4GMjYjEqpmCgiWbmV4mC3cpuqDeuA&s"
            alt="Logo Sekolah"
            class="w-10 h-10 rounded-full bg-white p-1 object-cover"
          >

          <div class="text-white">
            <h1 class="font-bold text-sm sm:text-base">
              SMK Contoh Indonesia
            </h1>

            <p class="text-xs text-blue-100">
              Tahun Ajaran 2025/2026
            </p>
          </div>
        </div>

        <span class="text-white text-xs sm:text-sm mt-2 sm:mt-0">
          Hasil Kelulusan
        </span>

      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="flex-1 flex items-center justify-center px-4 py-6">

    <div class="w-full max-w-2xl">

      <div
        id="hasil"
        class="bg-white rounded-2xl shadow-xl p-4 sm:p-6"
      >

        <div class="text-center">
          <h2 class="text-2xl font-bold text-slate-700">
            Memeriksa Data...
          </h2>
        </div>

      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="py-4 text-center">
    <p class="text-xs text-slate-500">
      © 2026 SMK Contoh Indonesia. All Rights Reserved.
    </p>
  </footer>

  <script>

    async function cekKelulusan() {

      const hasil =
        document.getElementById("hasil");

      try {

        const namaInput =
          localStorage.getItem("nama");

        const nisnInput =
          localStorage.getItem("nisn");

        const response =
          await fetch("data/siswa.json");

        if (!response.ok) {
          throw new Error("Gagal memuat data");
        }

        const data =
          await response.json();

        // Cari berdasarkan NISN
        const siswa = data.find(
          item =>
            item.nisn.toString().trim() ===
            nisnInput?.toString().trim()
        );

        // NISN tidak ditemukan
        if (!siswa) {

          hasil.innerHTML = `
            <div class="text-center">

              <div class="text-5xl mb-4">
                ❌
              </div>

              <h1 class="text-2xl font-bold text-red-600 mb-3">
                Data Tidak Ditemukan
              </h1>

              <p class="text-slate-600 mb-6">
                NISN tidak terdaftar pada sistem.
              </p>

              <a
                href="index.html"
                class="inline-block bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800"
              >
                Kembali
              </a>

            </div>
          `;

          return;
        }

        // Verifikasi nama
        if (
          siswa.nama.toLowerCase().trim() !==
          namaInput?.toLowerCase().trim()
        ) {

          hasil.innerHTML = `
            <div class="text-center">

              <div class="text-5xl mb-4">
                ⚠️
              </div>

              <h1 class="text-2xl font-bold text-amber-600 mb-3">
                Verifikasi Gagal
              </h1>

              <p class="text-slate-600 mb-6">
                Nama tidak sesuai dengan NISN yang dimasukkan.
              </p>

              <a
                href="index.html"
                class="inline-block bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800"
              >
                Kembali
              </a>

            </div>
          `;

          return;
        }

        const warnaStatus =
          siswa.status === "LULUS"
            ? "text-green-600"
            : "text-red-600";

        const iconStatus =
          siswa.status === "LULUS"
            ? "🎓"
            : "🙏";

        const judulStatus =
          siswa.status === "LULUS"
            ? "SELAMAT!"
            : "MOHON MAAF";

        const pesanStatus =
          siswa.status === "LULUS"
            ? "Anda dinyatakan LULUS"
            : "Anda dinyatakan TIDAK LULUS";

        hasil.innerHTML = `

          <div class="text-center mb-8">

            <div class="text-5xl sm:text-6xl mb-3">
              ${iconStatus}
            </div>

            <h1 class="text-2xl sm:text-3xl font-bold ${warnaStatus}">
              ${judulStatus}
            </h1>

            <p class="text-slate-600 mt-2">
              ${pesanStatus}
            </p>

          </div>

          <div class="space-y-3">

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 border-b pb-3">
              <div class="font-semibold text-slate-600">Nomor Urut</div>
              <div class="sm:col-span-2">${siswa.no}</div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 border-b pb-3">
              <div class="font-semibold text-slate-600">Nama Lengkap</div>
              <div class="sm:col-span-2 break-words">${siswa.nama}</div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 border-b pb-3">
              <div class="font-semibold text-slate-600">NIPD</div>
              <div class="sm:col-span-2">${siswa.nipd}</div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 border-b pb-3">
              <div class="font-semibold text-slate-600">NISN</div>
              <div class="sm:col-span-2">${siswa.nisn}</div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 border-b pb-3">
              <div class="font-semibold text-slate-600">Jenis Kelamin</div>
              <div class="sm:col-span-2">
                ${siswa.jk === "L" ? "Laki-Laki" : "Perempuan"}
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 border-b pb-3">
              <div class="font-semibold text-slate-600">Tempat Lahir</div>
              <div class="sm:col-span-2">${siswa.tempat_lahir}</div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 border-b pb-3">
              <div class="font-semibold text-slate-600">Tanggal Lahir</div>
              <div class="sm:col-span-2">${siswa.tanggal_lahir}</div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 border-b pb-3">
              <div class="font-semibold text-slate-600">NPSN</div>
              <div class="sm:col-span-2">${siswa.npsn}</div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
              <div class="font-semibold text-slate-600">
                Status Kelulusan
              </div>

              <div class="sm:col-span-2 font-bold ${warnaStatus}">
                ${siswa.status}
              </div>
            </div>

          </div>

          <div class="mt-8 text-center">

            <a
              href="index.html"
              class="inline-block bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800 transition"
            >
              Kembali
            </a>

          </div>

        `;

      } catch (error) {

        console.error(error);

        hasil.innerHTML = `
          <div class="text-center">

            <div class="text-5xl mb-4">
              ⚠️
            </div>

            <h1 class="text-2xl font-bold text-red-600 mb-3">
              Terjadi Kesalahan
            </h1>

            <p class="text-slate-600 mb-6">
              Gagal memuat data siswa.
            </p>

            <a
              href="index.html"
              class="inline-block bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800"
            >
              Kembali
            </a>

          </div>
        `;
      }
    }

    cekKelulusan();

  </script>

</body>
</html>
```

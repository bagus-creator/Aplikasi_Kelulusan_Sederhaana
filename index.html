
<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Pengumuman Kelulusan</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-blue-700 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">

      <div
        class="flex flex-col sm:flex-row sm:items-center sm:justify-between py-3 sm:h-16"
      >

        <div class="flex items-center gap-3">

          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRyOE9-T4GMjYjEqpmCgiWbmV4mC3cpuqDeuA&s"
            alt="Logo Sekolah"
            class="w-10 h-10 rounded-full bg-white p-1 object-cover"
          >

          <div class="text-white">

            <h1 class="font-bold text-sm sm:text-base">
              SMK Contoh Indonesia
            </h1>

            <p class="text-xs text-blue-100">
              Tahun Ajaran 2025/2026
            </p>

          </div>

        </div>

        <div
          class="text-white text-xs sm:text-sm mt-2 sm:mt-0"
        >
          Pengumuman Kelulusan
        </div>

      </div>

    </div>
  </nav>

  <!-- Content -->
  <main
    class="flex-1 flex items-center justify-center px-4 py-6"
  >

    <div class="w-full max-w-md sm:max-w-lg">

      <div
        class="bg-white rounded-2xl shadow-xl p-5 sm:p-8"
      >

        <!-- Header -->
        <div class="text-center mb-6">

          <h2
            class="text-2xl sm:text-3xl font-bold text-slate-800"
          >
            Pengumuman Kelulusan
          </h2>

          <p
            class="text-slate-500 text-sm sm:text-base mt-2"
          >
            Silakan masukkan Nama Lengkap dan NISN
            untuk melihat hasil kelulusan.
          </p>

        </div>

        <!-- Form -->
        <form
          id="formKelulusan"
          class="space-y-4"
        >

          <!-- Nama -->
          <div>

            <label
              for="nama"
              class="block text-sm font-medium mb-2"
            >
              Nama Lengkap
            </label>

            <input
              type="text"
              id="nama"
              required
              autocomplete="off"
              placeholder="Masukkan nama lengkap"
              class="w-full border border-slate-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >

          </div>

          <!-- NISN -->
          <div>

            <label
              for="nisn"
              class="block text-sm font-medium mb-2"
            >
              NISN
            </label>

            <input
              type="text"
              id="nisn"
              required
              autocomplete="off"
              placeholder="Masukkan NISN"
              class="w-full border border-slate-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >

          </div>

          <!-- Button -->
          <button
            type="submit"
            class="w-full bg-blue-700 hover:bg-blue-800 text-white py-3 rounded-lg font-semibold transition duration-200"
          >
            Cek Kelulusan
          </button>

        </form>

        <!-- Informasi -->
        <div class="mt-6 text-center">

          <p
            class="text-xs sm:text-sm text-slate-500"
          >
            Pastikan Nama dan NISN yang dimasukkan
            sesuai dengan data sekolah.
          </p>

        </div>

      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="py-4 text-center">

    <p class="text-xs text-slate-500">
      © 2026 SMK Contoh Indonesia.
      All Rights Reserved.
    </p>

  </footer>

  <script>

    document
      .getElementById("formKelulusan")
      .addEventListener("submit", function(e) {

        e.preventDefault();

        const nama =
          document
            .getElementById("nama")
            .value
            .trim();

        const nisn =
          document
            .getElementById("nisn")
            .value
            .trim();

        localStorage.setItem(
          "nama",
          nama
        );

        localStorage.setItem(
          "nisn",
          nisn
        );

        window.location.href =
          "hasil.html";

      });

  </script>

</body>
</html>
```
